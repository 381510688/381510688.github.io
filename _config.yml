# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: 李刚的学习专栏
subtitle: 行胜于言，自强不息！纸上得来终觉浅，绝知此事要躬行！
description: JavaScript Node HTML
author: Li Gang
language: zh-CN
timezone:

# URL
## If your site is put in a subdirectory, set url as 'http://yoursite.com/child' and root as '/child/'
url: https://381510688.github.io
root: /
permalink: :category/:title/
permalink_defaults:

# Directory
source_dir: source
public_dir: public
archive_dir: archives
category_dir: categories
tag_dir: tags
about_dir: about
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link: true # Open external links in new tab
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace:

# Category & Tag
default_category: JavaScript
category_map:
  JavaScript: javascript
  Git: git
  HTML: html
  其他: other
tag_map:
  JavaScript: javascript
  编写高质量代码: writingsdiocode
  Git: javascript
  HTML: javascript
  杂谈: other

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: icarus

# Deployment
## Docs: https://hexo.io/docs/deployment.html
deploy:
  type: git
  repo: https://github.com/381510688/381510688.github.io.git
  branch: master
  message: '站点更新:{{now("YYYY-MM-DD HH:mm:ss")}}'